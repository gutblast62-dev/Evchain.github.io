<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVCHAIN — Redirecting…</title>
<style>
  body { background: #f4f6f9; font-family: 'Barlow', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .wrap { text-align: center; }
  .logo { font-size: 36px; font-weight: 700; letter-spacing: 5px; color: #d4890a; font-family: 'Barlow Condensed', sans-serif; }
  .sub { font-size: 12px; color: #8a9ab0; margin-top: 4px; letter-spacing: 2px; font-family: monospace; }
  .msg { font-size: 13px; color: #4a5a70; margin-top: 20px; }
</style>
<script>
  // GitHub Pages 404 redirect — preserves the ?evid= param for QR deep-links
  // Redirects: /Evchain/anything?evid=X  →  /Evchain/?evid=X
  (function() {
    var repo = '/Evchain'; // ← Change this to your repository name if different
    var search = window.location.search;
    var hash   = window.location.hash;
    // Redirect to root index with the original query string intact
    var redirectUrl = window.location.origin + repo + '/' + search + hash;
    window.location.replace(redirectUrl);
  })();
</script>
</head>
<body>
  <div class="wrap">
    <div class="logo">EVCHAIN</div>
    <div class="sub">EVIDENCE MANAGEMENT SYSTEM</div>
    <div class="msg">Redirecting…</div>
  </div>
</body>
</html>
